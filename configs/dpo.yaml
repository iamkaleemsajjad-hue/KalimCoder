### DPO training configuration for KaleemCoder
### Run with: llamafactory-cli train configs/dpo.yaml

model_name_or_path: ../adapters/kaleemcoder-sft
trust_remote_code: true

### Method
stage: dpo
do_train: true
finetuning_type: lora
pref_beta: 0.1
pref_loss: sigmoid   # sigmoid | hinge | ipo | orpo | simpo

### Dataset
dataset: kaleemcoder_dpo  # register preference pairs in dataset_info.json
template: qwen
cutoff_len: 2048
max_samples: 10000

### Output
output_dir: ../adapters/kaleemcoder-dpo
logging_steps: 10
save_steps: 200
save_total_limit: 2
overwrite_output_dir: true

### Training hyperparams
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### QLoRA
quantization_bit: 4
quantization_method: bitsandbytes
