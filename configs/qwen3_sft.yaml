### QLoRA SFT config for Qwen3-8B using LLaMA Factory
### Run with: llamafactory-cli train configs/qwen3_sft.yaml

model_name_or_path: ../checkpoints/qwen3-8b-base
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora

### Dataset
dataset: codealpaca  # register in data/dataset_info.json
template: qwen
cutoff_len: 2048
max_samples: 50000
overwrite_cache: true
preprocessing_num_workers: 4

### Output
output_dir: ../adapters/kaleemcoder-sft
logging_steps: 10
save_steps: 500
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

### Training hyperparams
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Quantization (QLoRA)
quantization_bit: 4
quantization_method: bitsandbytes
